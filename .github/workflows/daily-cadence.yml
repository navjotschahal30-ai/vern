name: Daily Cadence

on:
  schedule:
    - cron: '0 13 * * *' # 9am ET

jobs:
  trigger-cadence:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /cadence/daily
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST https://vern-production.up.railway.app/cadence/daily)
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP status: $status"
          echo "Response body: $body"
          if [ "$status" -ge 400 ]; then
            exit 1
          fi
