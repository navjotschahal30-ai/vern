name: Cadence (every 3 days)

on:
  schedule:
    # 9am ET, every ~3 days. GitHub Actions cron has no native "every N days"
    # interval — this fires when day-of-month % 3 == 0, which drifts by a
    # day at most around month boundaries. No longer weekday-only: this now
    # also runs the pool-refresh/tag-sweep (see app.ts), not just sends, so
    # skipping weekends would skip evaluation too, not just outreach.
    - cron: '0 13 */3 * *'
  workflow_dispatch: {} # lets a missed/delayed schedule run be triggered by hand from Actions or `gh workflow run`

jobs:
  trigger-cadence:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /cadence/daily
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST https://vern-yhdd.onrender.com/cadence/daily)
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP status: $status"
          echo "Response body: $body"
          if [ "$status" -ge 400 ]; then
            exit 1
          fi
